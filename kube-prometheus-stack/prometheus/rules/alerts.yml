groups:
  - name: availability-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "Service on {{ $labels.instance }} has not responded for 30 seconds."

      - alert: InstanceDownWarning
        expr: up == 0
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "Service on {{ $labels.instance }} has not responded for 10 seconds."